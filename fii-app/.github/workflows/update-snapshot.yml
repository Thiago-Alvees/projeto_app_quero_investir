name: Update FIIs Snapshot

on:
  schedule:
    # 21:10 UTC = 18:10 no Brasil (Fortaleza, UTC-3)
    # Segunda a sexta
    - cron: "10 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate snapshot
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: |
          node scripts/update_snapshot.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "snapshot-bot"
          git config user.email "snapshot-bot@users.noreply.github.com"
          git add data/fiis_snapshot.json
          git diff --cached --quiet || git commit -m "chore(snapshot): update FIIs prices"
          git push

name: Update Market Snapshots

on:
  schedule:
    - cron: "0 */3 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"

      - name: Generate FII quote snapshot
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: |
          node scripts/update_snapshot.mjs

      - name: Generate market quote snapshot
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: |
          node scripts/update_market_snapshot.mjs

      - name: Generate market quote snapshot (sharded)
        if: ${{ github.event_name == 'schedule' }}
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
          MARKET_SNAPSHOT_SHARDS: "3"
        run: |
          node scripts/update_market_snapshot.mjs

      - name: Generate events feed (CVM IPE)
        continue-on-error: true
        run: |
          node scripts/update_events_feed.mjs

      - name: Checkout public snapshot repo
        uses: actions/checkout@v4
        with:
          repository: Thiago-Alvees/app_snapshot
          token: ${{ secrets.SNAPSHOT_REPO_TOKEN }}
          path: snapshot-repo

      - name: Copy snapshots to public repo
        run: |
          mkdir -p snapshot-repo/data
          cp data/fiis_snapshot.json snapshot-repo/data/fiis_snapshot.json
          cp data/market_snapshot.json snapshot-repo/data/market_snapshot.json
          if [ -f data/events_feed.json ]; then cp data/events_feed.json snapshot-repo/data/events_feed.json; fi

      - name: Commit and push to public repo
        run: |
          cd snapshot-repo
          git config user.name "snapshot-bot"
          git config user.email "snapshot-bot@users.noreply.github.com"
          git add data/fiis_snapshot.json data/market_snapshot.json
          if [ -f data/events_feed.json ]; then git add data/events_feed.json; fi
          git diff --cached --quiet || git commit -m "chore(snapshot): update market data"
          git push

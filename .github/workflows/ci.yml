name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fii-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: npm
          cache-dependency-path: fii-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check worker syntax
        run: |
          node --check ../scripts/update_snapshot.mjs
          node --check ../scripts/update_market_snapshot.mjs
          node --check ../scripts/update_market_fundamentals.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
